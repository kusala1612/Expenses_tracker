<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Expense Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #6dd5ed, #2193b0);
      text-align: center;
      padding: 50px;
    }
    #login,#register,
#dashboard {
  background: white;
  padding: 20px;
  border-radius: 10px;
  display: inline-block;
  width: 90%;
  max-width: 1000px;
}
    input,select {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 80%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      margin: 5px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #2193b0;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #197a91;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 5px 0;
      padding: 8px;
      background: #f1f1f1;
      border-radius: 5px;
    }
    .expense-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .expense-text {
      flex: 1;
      text-align: left;
    }
    #expenseChart {
       max-width: 700px;
       max-height: 400px;
       margin: 20px auto;
      }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="login">
    <h2>Expense Manager Login</h2>
    <input id="login-username" placeholder="Username" />
    <input id="login-password" type="password" placeholder="Password" />
    <label>
      <input type="checkbox" id="stayLoggedIn">
      Stay Logged In
    </label>
<div style="margin:15px;">

<label>
<input type="checkbox" id="stayLoggedIn">
Stay Logged In
</label>

</div>

<button onclick="login()">
Login
</button>

<p>
Don't have an account?
<a href="#" onclick="showRegister()">
Register
</a>
</p>
  </div>

  <!-- Register -->
  <div id="register" style="display:none;">
    <h2>Register</h2>
    <input id="register-username" placeholder="Username" />
    <input id="register-password" type="password" placeholder="Password" />
    <button onclick="register()">Register</button>
    <button onclick="showLogin()">Back to Login</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none;">
    <h2>Welcome, <span id="user"></span></h2>
  <input id="expense-date" type="date" />

<input id="amount" placeholder="Amount" type="number" />

<input id="description" placeholder="Description" />

<select id="category">
  <option value="Food">Food</option>
  <option value="Travel">Travel</option>
  <option value="Shopping">Shopping</option>
  <option value="Bills">Bills</option>
  <option value="Other">Other</option>
</select>

<button onclick="addExpense()">Add Expense</button>

<hr>

<h3>Total Between Dates</h3>

<input id="start-date" type="date">
<input id="end-date" type="date">

<button onclick="getTotalBetweenDates()">
  Calculate
</button>

<p>
  Total Between Dates:
  ₹<span id="date-total">0</span>
</p>

<hr>

<h3>Import Expenses</h3>

<input type="file" id="csvFile">

<button onclick="importCSV()">
 Import CSV
</button>

<button onclick="exportCSV()">
 Export CSV
</button>

<hr>

<button onclick="showMonthlyGraph()">
 Monthly Graph
</button>

<button onclick="showYearlyGraph()">
 Yearly Graph
</button>

<h3>Add Income</h3>

<input
type="date"
id="income-date">

<input
id="income-source"
placeholder="Income Source">

<input
type="number"
id="income-amount"
placeholder="Income Amount">

<button onclick="addIncome()">
Add Income

</button>

<hr>
<canvas id="expenseChart"></canvas>
    <h3>Your Expenses</h3>
    <ul id="expenses"></ul>
    <h3>Total Income:₹<span id="income-total">0.00</span></h3>

<h3>
Total Expense:
₹<span id="total">0.00</span>
</h3>

<h3>
Current Balance:
₹<span id="savings">0.00</span>
</h3>
    <button onclick="logout()">Logout</button>
  </div>

  <script>
    const BASE_API = "https://expenses-tracker-1-msb1.onrender.com";
    let userId = null;
    let expenseChart = null;
// ----------------- Login -----------------
    async function login() {
      const username = document.getElementById("login-username").value;
      const password = document.getElementById("login-password").value;

      try {
        const res = await fetch(`${BASE_API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

if (res.ok && data.message === "Login successful!") {

    localStorage.setItem(
        "userId",
        data.user_id
    );

    localStorage.setItem(
        "username",
        username
    );

    window.location.href = "/home";

}
 else {
          alert(data.message || "Login failed");
        }
      } catch {
        alert("Error connecting to server");
      }
    }
// ----------------- Register -----------------
    async function register() {
      const username = document.getElementById("register-username").value;
      const password = document.getElementById("register-password").value;

      try {
        const res = await fetch(`${BASE_API}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.message === "User registered!") {
          alert("Registration successful, please login.");
          showLogin();
        } else {
          alert(data.message || "Registration failed");
        }
      } catch {
        alert("Error connecting to server");
      }
    }

// ----------------- Add Income -----------------  
async function addIncome() {

 const selectedDate =
 document.getElementById(
 "income-date"
 ).value;

 const source =
 document.getElementById(
 "income-source"
 ).value;

 const amount =
 document.getElementById(
 "income-amount"
 ).value;

 if(
 !selectedDate ||
 !source ||
 !amount
 ){
   alert("Fill all income fields");
   return;
 }

 const date =
 selectedDate
 .split("-")
 .reverse()
 .join("-");

 const res =
 await fetch(
 `${BASE_API}/income`,
 {
   method:"POST",
   headers:{
     "Content-Type":
     "application/json"
   },
   body:JSON.stringify({
   userId:userId,
   date,
   source,
   amount
})
 });

 const data =
 await res.json();

 alert(data.message);

 loadIncomeTotal();
 loadSavings();

 document.getElementById(
 "income-date"
 ).value="";

 document.getElementById(
 "income-source"
 ).value="";

 document.getElementById(
 "income-amount"
 ).value="";
}

// ----------------- Add Expense -----------------
async function addExpense() {

  const amount =
  document.getElementById("amount").value;

  const description =
  document.getElementById("description").value;

  const selectedDate =
  document.getElementById("expense-date").value;

  const category =
  document.getElementById("category").value;

  const date =
  selectedDate
  .split("-")
  .reverse()
  .join("-");

  if (!amount || !description || !selectedDate) {
    alert("Please fill all fields");
    return;
  }

  const res = await fetch(`${BASE_API}/expenses`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId: userId,
      date,
      description,
      amount,
      category
})
  });

  const data = await res.json();

  if (res.ok) {

    loadExpenses();
    loadTotal();
    loadSavings();
    document.getElementById("amount").value = "";
    document.getElementById("description").value = "";
    document.getElementById("expense-date").value =new Date().toISOString().split("T")[0];  }
  else {
    alert(data.message);
  }
}
// ----------------- Load Expenses -----------------
    async function loadExpenses() {
      try {
        const res = await fetch(`${BASE_API}/expenses/${userId}`);
        const data = await res.json();
        const list = document.getElementById("expenses");
        list.innerHTML = "";

        if (Array.isArray(data) && data.length > 0) {
          data.forEach(expense => {
            const li = document.createElement("li");
            li.className = "expense-item";
            li.innerHTML = `<div class="expense-text">
${expense.date}: ₹${expense.amount}
- ${expense.description}
(${expense.category})
</div>
              <button onclick="deleteExpense(${expense.id})">Delete</button>
            `;
            list.appendChild(li);
          });
        } else {
          list.innerHTML = "<li>No expenses yet.</li>";
        }
      } catch {
        alert("Error loading expenses");
      }
    }
// ----------------- Delete Expense -----------------
    async function deleteExpense(expenseId) {
      try {
        const res = await fetch(`${BASE_API}/expenses/${userId}/${expenseId}`, {
          method: "DELETE"
        });
        const data = await res.json();

        if (res.ok) {
          loadExpenses();
          loadTotal();
          loadSavings();

        } else {
          alert(data.message || "Failed to delete expense");
        }
      } catch {
        alert("Error deleting expense");
      }
    }
// ----------------- Load Total -----------------
    async function loadTotal() {
      try {
        const res = await fetch(`${BASE_API}/expenses/total/${userId}`);
        const data = await res.json();
        document.getElementById("total").innerText = data.total.toFixed(2);
      } catch {
        document.getElementById("total").innerText = "Error";
      }
    }
// ----------------- Load Income Total -----------------
async function loadIncomeTotal(){

 const res =
 await fetch(
 `${BASE_API}/income/total/${userId}`
 );

 const data =
 await res.json();

 document.getElementById(
 "income-total"
 ).innerText =
 data.total.toFixed(2);
}
// ----------------- Load Savings -----------------
async function loadSavings(){

 const expenseRes =
 await fetch(
 `${BASE_API}/expenses/total/${userId}`
 );

 const expenseData =
 await expenseRes.json();

 const incomeRes =
 await fetch(
 `${BASE_API}/income/total/${userId}`
 );

 const incomeData =
 await incomeRes.json();

 const savings =
 incomeData.total -
 expenseData.total;

 document.getElementById(
 "savings"
 ).innerText =
 savings.toFixed(2);
}
// ----------------- Logout -----------------
    function logout() {
      userId = null;
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("login").style.display = "block";
      document.getElementById("login-username").value = "";
      document.getElementById("login-password").value = "";
    }
// ----------------- Show Register -----------------
    function showRegister() {
      document.getElementById("login").style.display = "none";
      document.getElementById("register").style.display = "block";
    }
  // ----------------- Show Login -----------------
    function showLogin() {
      document.getElementById("register").style.display = "none";
      document.getElementById("login").style.display = "block";
    }
// ----------------- Total Between Dates -----------------
async function getTotalBetweenDates() {
  if (
 !document.getElementById("start-date").value ||
 !document.getElementById("end-date").value
){
 alert("Please select both dates");
 return;
}

 const start =
 document.getElementById(
 "start-date"
 ).value
 .split("-")
 .reverse()
 .join("-");

 const end =
 document.getElementById(
 "end-date"
 ).value
 .split("-")
 .reverse()
 .join("-");

 const res =
 await fetch(
 `${BASE_API}/expenses/total_between/${userId}`,
 {
  method:"POST",
  headers:{
   "Content-Type":
   "application/json"
  },
  body:JSON.stringify({
   start,
   end
  })
 });

 const data =
 await res.json();

 document.getElementById(
 "date-total"
 ).innerText =
 data.total;
}
// ----------------- Export CSV -----------------
function exportCSV() {

 window.open(
 `${BASE_API}/export_csv/${userId}`
 );
}

// ----------------- Import CSV -----------------
async function importCSV() {

 const file =
 document.getElementById(
 "csvFile"
 ).files[0];

 if (!file) {
  alert("Please select a CSV file");
  return;
}
 const formData =
 new FormData();

 formData.append(
 "file",
 file
 );

 formData.append(
 "user_id",
 userId
 );

 const res =
 await fetch(
 `${BASE_API}/import_csv`,
 {
  method:"POST",
  body:formData
 });

 const data =
 await res.json();

 alert(data.message);

loadExpenses();

loadTotal();

loadIncomeTotal();

loadSavings();}
// ----------------- Show Monthly Graph -----------------
async function showMonthlyGraph(){

 const res =
 await fetch(
 `${BASE_API}/monthly_summary/${userId}`
 );

 const data =
 await res.json();

 const labels =
 data.map(x=>x.month);

 const totals =
 data.map(x=>x.total);
if(expenseChart){
 expenseChart.destroy();
}
 expenseChart = new Chart(
 document.getElementById(
 "expenseChart"
 ),
 {
  type:"bar",
  data:{
   labels,
   datasets:[{
    label:"Monthly Expenses",
    data:totals
   }]
  }
 });
}
// ----------------- Show Yearly Graph -----------------
async function showYearlyGraph(){

 const res =
 await fetch(
 `${BASE_API}/yearly_summary/${userId}`
 );

 const data =
 await res.json();

 const labels =
 data.map(x=>x.year);

 const totals =
 data.map(x=>x.total);
if(expenseChart){
 expenseChart.destroy();
}
 expenseChart = new Chart(
 document.getElementById(
 "expenseChart"
 ),
 {
  type:"bar",
  data:{
   labels,
   datasets:[{
    label:"Yearly Expenses",
    data:totals
   }]
  }
 });
}
  </script>
</body>
