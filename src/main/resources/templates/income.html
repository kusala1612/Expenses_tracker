<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Income</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#F8F5F2;
    margin:0;
}

.header{
    background:#2D6A4F;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:600px;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer;
    color:white;
    font-size:16px;
}

.submit{
    background:#2ECC71;
}

.home{
    background:#40916C;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
<h1>Add Income</h1>
</div>

<div class="container">

<div class="card">

<label>Date</label>
<input type="date" id="date">

<label>Source</label>
<input type="text" id="source" placeholder="Income Source">

<label>Amount</label>
<input type="number" id="amount" placeholder="Amount">

<button class="submit" onclick="addIncome()">
Submit
</button>

<button class="home" onclick="goHome()">
Home
</button>

<p id="message" class="message"></p>

</div>

</div>

<script>

const userId =
localStorage.getItem("userId");

async function addIncome(){

const date =
document.getElementById("date").value;

const source =
document.getElementById("source").value;

const amount =
document.getElementById("amount").value;

const response =
await fetch("/income",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

userId:userId,
date:date,
source:source,
amount:amount

})

});

const result =
await response.json();

document.getElementById(
"message"
).innerText =
result.message;

}

function goHome(){

window.location.href =
"/home";

}

</script>

</body>
</html>
