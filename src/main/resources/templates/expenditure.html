<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Expenditure</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#F8F5F2;
    margin:0;
}

.header{
    background:#2D6A4F;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:700px;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.submit{
    background:#E63946;
}

.home{
    background:#40916C;
}

.section{
    margin-top:25px;
}

.message{
    text-align:center;
    font-weight:bold;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="header">
<h1>Add Expenditure</h1>
</div>

<div class="container">

<div class="card">

<h3>Manual Entry</h3>

<label>Date</label>
<input type="date" id="date">

<label>Amount</label>
<input type="number" id="amount">

<label>Description</label>
<input type="text" id="description">

<label>Category</label>

<select id="category" onchange="toggleOther()">

<option value="Food">Food</option>

<option value="Travel">Travel</option>

<option value="Shopping">Shopping</option>

<option value="Bills">Bills</option>

<option value="Health">Health</option>

<option value="Entertainment">Entertainment</option>

<option value="Other">Other</option>

</select>

<input
type="text"
id="otherCategory"
placeholder="Enter Category"
style="display:none;">

<button
class="submit"
onclick="addExpense()">
Submit
</button>

<hr>

<div class="section">

<h3>File Submission</h3>

<input
type="file"
id="expenseFile"
accept=".csv,.xlsx">

<button
class="submit"
onclick="uploadFile()">
Submit
</button>

</div>

<button
class="home"
onclick="goHome()">
Home
</button>

<p id="message" class="message"></p>

</div>

</div>

<script>

const userId =
localStorage.getItem("userId");

function toggleOther(){

const category =
document.getElementById(
"category"
).value;

document.getElementById(
"otherCategory"
).style.display =
category==="Other"
? "block"
: "none";

}

async function addExpense(){

let category =
document.getElementById(
"category"
).value;

if(category==="Other"){

category =
document.getElementById(
"otherCategory"
).value;

}

const response =
await fetch("/expenses",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

userId:userId,

date:
document.getElementById(
"date"
).value,

amount:
document.getElementById(
"amount"
).value,

description:
document.getElementById(
"description"
).value,

category:category

})

});

const result =
await response.json();

document.getElementById(
"message"
).innerText =
result.message;

}

async function uploadFile(){

const file =
document.getElementById(
"expenseFile"
).files[0];

if(!file){

alert(
"Please choose a file"
);

return;

}

const formData =
new FormData();

formData.append(
"file",
file
);

formData.append(
"userId",
userId
);

const response =
await fetch(
"/import_csv",
{
method:"POST",
body:formData
}
);

const result =
await response.json();

document.getElementById(
"message"
).innerText =
result.message;

}

function goHome(){

window.location.href =
"/home";

}

</script>

</body>
</html>
